<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title><%= webpackConfig.name %></title>
    <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
  <style>
    html, body, #app { height: 100%; margin: 0; padding: 0; }
    .chromeframe { margin: 0.2em 0; background: #ccc; color: #000; padding: 0.2em 0; }

    #loader-wrapper {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 999999;
      background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }

    .loader-dots {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .loader-dots span {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #2563eb;
      animation: dot-pulse 1.2s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; opacity: 0.65; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; opacity: 0.35; }

    @keyframes dot-pulse {
      0%, 100% { transform: scale(0.7); opacity: 0.3; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .loader-title {
      font-size: 15px;
      color: #64748b;
      letter-spacing: 0.5px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .loaded #loader-wrapper {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  </head>
  <body>
    <div id="app">
      <div id="loader-wrapper">
        <div class="loader-dots">
          <span></span><span></span><span></span>
        </div>
        <div class="loader-title">正在加载系统资源，请耐心等待</div>
      </div>
    </div>
  </body>
</html>
