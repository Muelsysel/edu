version : '3.8'
services:
  edu-nacos:
    container_name: edu-nacos
    restart: always
    image: nacos/nacos-server
    build:
      context: ./nacos
    environment:
      - MODE=standalone
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
      - NACOS_AUTH_TOKEN=VGhpSXNBQmFzZTY0U2VjcmV0S2V5VGhhdElzQXRMZWFzdDMyQnl0ZXNMb25nRm9yTmFjb3M=
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      - edu-mysql
  edu-mysql:
    container_name: edu-mysql
    restart: always
    image: mysql:5.7
    build:
      context: ./mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command: [
          'mysqld',
          '--innodb-buffer-pool-size=80M',
          '--character-set-server=utf8mb4',
          '--collation-server=utf8mb4_unicode_ci',
          '--default-time-zone=+8:00',
          '--lower-case-table-names=1'
        ]
    environment:
      MYSQL_DATABASE: 'edu_system'
      MYSQL_ROOT_PASSWORD: 242648
  edu-redis:
    container_name: edu-redis
    restart: always
    image: redis
    build:
      context: ./redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/edu/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/edu/redis/redis.conf
  edu-nginx:
    container_name: edu-nginx
    image: nginx
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/edu/projects/edu-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - edu-gateway
    links:
      - edu-gateway
  edu-gateway:
    container_name: edu-gateway
    build:
      context: ./edu/gateway
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - edu-redis
    links:
      - edu-redis
  edu-auth:
    container_name: edu-auth
    build:
      context: ./edu/auth
      dockerfile: dockerfile
    ports:
      - "9200:9200"
    depends_on:
      - edu-redis
    links:
      - edu-redis
  edu-modules-system:
    container_name: edu-modules-system
    build:
      context: ./edu/modules/system
      dockerfile: dockerfile
    ports:
      - "9201:9201"
    depends_on:
      - edu-redis
      - edu-mysql
    links:
      - edu-redis
      - edu-mysql
  edu-modules-job:
    container_name: edu-modules-job
    build:
      context: ./edu/modules/job
      dockerfile: dockerfile
    ports:
      - "9203:9203"
    depends_on:
      - edu-mysql
    links:
      - edu-mysql
  edu-modules-file:
    container_name: edu-modules-file
    build:
      context: ./edu/modules/file
      dockerfile: dockerfile
    ports:
      - "9300:9300"
    volumes:
    - ./edu/uploadPath:/home/edu/uploadPath
  edu-visual-monitor:
    container_name: edu-visual-monitor
    build:
      context: ./edu/visual/monitor
      dockerfile: dockerfile
    ports:
      - "9100:9100"
  edu-modules-achievement:
    container_name: edu-modules-achievement
    build:
      context: ./edu/modules/achievement
      dockerfile: dockerfile
    ports:
      - "9205:9205"
    depends_on:
      - edu-mysql
    links:
      - edu-mysql
  edu-minio:
    container_name: edu-minio
    restart: always
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
