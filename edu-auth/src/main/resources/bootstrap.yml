# Tomcat
server: 
  port: 9200

# Spring
spring:
  main:
    # 允许 Bean 定义覆盖，解决 Feign 命名冲突
    allow-bean-definition-overriding: true
  application:
    # 应用名称
    name: edu-auth
  profiles:
    # 环境配置
    active: dev
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: 127.0.0.1:8848
      config:
        # 配置中心地址
        server-addr: 127.0.0.1:8848
        # 配置文件格式
        file-extension: yml
        # 共享配置
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
